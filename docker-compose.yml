services:
  auth-app-prod:
    image: lambki/auth-app-prod:latest
    container_name: auth-app-prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH}
    restart: unless-stopped
    # Create tables on a fresh database if they don't exist yet (no sample data); then start the server
    command: sh -c "node scripts/docker-ensure-schema.mjs && node server.js"
    expose:
      - "3000"
    networks:
      edge:
        aliases:
          - auth-app-prod
    # Loads all variables from .env.production into the container
    env_file:
      - .env
    environment:
      # Node environment (defaults to production if not set)
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/auth}
      POSTGRES_URL: ${POSTGRES_URL}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DEBUG: ${DEBUG:-false}
      # If no super admin exists yet, both must be set to auto-create the first admin on startup
      # (forced to change their password on first login). See scripts/bootstrap-admin.mjs.
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}

networks:
  edge:
    external: true
